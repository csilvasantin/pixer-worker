name = "pixer-eleven"
main = "src/index.js"
compatibility_date = "2026-05-02"

# Secrets se ponen con: npx wrangler secret put NOMBRE
# - ELEVENLABS_KEY  (obligatoria)
# - XAI_KEY         (opcional, para futuras llamadas a Grok)

[observability]
enabled = true

# Cron de respaldo: regenera stock/index.json (índice estático servido por
# r2.dev, que esquiva el bloqueo ISP de workers.dev). Las mutaciones también
# lo regeneran al vuelo; esto cubre escrituras perdidas.
[triggers]
crons = ["*/10 * * * *", "*/2 * * * *"]

# KV para signage de Admira XP (también usado por stock con prefijos stock:meta:* y stock_index)
[[kv_namespaces]]
binding = "SIGNAGE_KV"
id = "013098f4df534234994ae04b8c1929a5"

# R2 para Stock público (blobs de audio/música/imágenes/video)
# Crear con: npx wrangler r2 bucket create pixer-stock
[[r2_buckets]]
binding = "STOCK_BUCKET"
bucket_name = "pixer-stock"

# Service binding al cerebro del DigitalAvatar.ai / Metahuman. Un Worker NO puede
# hacer fetch() a otro Worker del mismo *.workers.dev (error 1042); el binding
# enruta la subpetición por la malla interna de Cloudflare. Lo usa el proxy /da/*
# para esquivar el bloqueo ISP español de workers.dev sin tocar al cliente.
[[services]]
binding = "OMNI"
service = "omnipublicity-api"
